# 生产环境配置
# 使用方法: java -jar app.jar --spring.profiles.active=prod

server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/reference_material_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: xjYY3687!

jwt:
  secret: ZcVkhpqjyVqkxlRy7CrxRv0/yrywh1pLHYbq27kP9gcvhOASFMdCaYfluZX4GzQv
  expiration: 86400000

app:
  cors:
    allowed-origins: http://localhost,http://127.0.0.1,http://8.138.246.23
  swagger:
    enabled: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.rmm.entity
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境关闭 SQL 日志
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.rmm: INFO
    root: WARN

backup:
  # 生产环境备份文件存储目录（建议使用绝对路径）
  # 示例: /var/backups/rmm 或通过环境变量 BACKUP_DIR 设置
  directory: ${BACKUP_DIR:/var/backups/rmm}
  # mysqldump 工具路径（可选，不配置则自动检测）
  # Linux 通常为: /usr/bin/mysqldump
  # 或通过环境变量 MYSQLDUMP_PATH 设置
  mysqldump-path: ${MYSQLDUMP_PATH:}
