server:
  port: 8080

spring:
  application:
    name: reference-material-management
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/reference_material_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
  sql:
    init:
      mode: always
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.rmm.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: YBoS2OSL7d+HgUWKT2+9O6j884tSArIAKN3vubTVmWngH2ql84pJafiIvh4dPvPA
  expiration: 86400000

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost,http://localhost:80,http://localhost:3002}
  swagger:
    enabled: ${SWAGGER_ENABLED:false}

logging:
  level:
    com.rmm: DEBUG

backup:
  # 备份文件存储目录（支持环境变量 BACKUP_DIR）
  directory: ${BACKUP_DIR:backups}
  # mysqldump 工具路径（可选，不配置则自动检测）
  # Windows 示例: C:\Program Files\MySQL\MySQL Server 8.0\bin\mysqldump.exe
  # Linux 示例: /usr/bin/mysqldump
  # 支持环境变量 MYSQLDUMP_PATH
  mysqldump-path: ${MYSQLDUMP_PATH:}

# 文件上传配置
upload:
  # 上传文件存储目录（支持环境变量 UPLOAD_PATH）
  # 开发环境：使用用户主目录下的 uploads 文件夹
  # 生产环境：通过环境变量 UPLOAD_PATH 设置，如 /var/rmm/uploads
  path: ${UPLOAD_PATH:${user.home}/uploads}
